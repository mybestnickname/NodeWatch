[tool.autopep8]
max_line_length = 120

[tool.ruff]
line-length = 120
target-version = "py310"

[tool.ruff.lint]
# pycodestyle (E, W), pyflakes (F), isort (I), pyupgrade (UP), flake8-bugbear (B)
select = ["E", "W", "F", "I", "UP", "B"]
ignore = ["B008"]  # FastAPI relies on function calls in argument defaults (Depends, etc.)

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_unused_ignores = true
no_implicit_optional = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-q"
